<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Porridge Distribution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-home" class="bg-light pb-5">

    <nav class="navbar navbar-dark bg-success shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-bowl-rice"></i> PorridgeApp</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h3 class="mb-4 text-secondary">Dashboard</h3>
        <div class="row g-3">
            <div class="col-6">
                <div class="card stat-card bg-primary text-white shadow-sm h-100">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-users fa-2x mb-2"></i>
                        <h5 class="card-title" id="stat-registered">0</h5>
                        <p class="card-text small">Pending Registrations</p>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card stat-card bg-success text-white shadow-sm h-100">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-check-circle fa-2x mb-2"></i>
                        <h5 class="card-title" id="stat-issued-today">0</h5>
                        <p class="card-text small">Families Issued Today</p>
                    </div>
                </div>
            </div>
            <div class="col-12 mt-3">
                <div class="card shadow-sm border-success">
                    <div class="card-body">
                        <h5 class="card-title text-success"><i class="fa-solid fa-chart-line"></i> Today's Summary</h5>
                        <p class="mb-1 text-dark fs-5">Total Portions Fed Today: <strong class="text-success fs-3" id="stat-portions">0</strong></p>
                    </div>
                </div>
            </div>

            <!-- RESET BUTTON -->
            <div class="col-12 mt-4">
                <button class="btn btn-outline-danger w-100 py-2 shadow-sm" onclick="clearAllData()">
                    <i class="fa-solid fa-trash-can"></i> Factory Reset (Clear Local Data)
                </button>
                <p class="text-muted small text-center mt-2">This will clear today's issues and pending registrations from this device.</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav bg-white shadow">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-home"></i><span>Home</span></a>
        <a href="register.html" class="nav-item"><i class="fa-solid fa-user-plus"></i><span>Register</span></a>
        <a href="issue.html" class="nav-item"><i class="fa-solid fa-qrcode"></i><span>Issue</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
