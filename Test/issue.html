<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue - Porridge Distribution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-issue" class="bg-light pb-5">

    <nav class="navbar navbar-dark bg-success shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Issue Porridge</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5 pb-4">
        <!-- Scanner Area -->
        <div class="card shadow-sm mb-3">
            <div class="card-body text-center">
                <div id="qr-reader" style="width: 100%;"></div>
                <button class="btn btn-outline-success mt-3" id="btn-start-scan"><i class="fa-solid fa-camera"></i> Start Scanner</button>
                <button class="btn btn-outline-danger mt-3 d-none" id="btn-stop-scan"><i class="fa-solid fa-stop"></i> Stop</button>
            </div>
        </div>

        <!-- Result Card (Hidden initially) -->
        <div id="issue-details" class="card shadow-sm bg-success text-white d-none mb-3">
            <div class="card-body text-center py-4">
                <i class="fa-solid fa-check-circle fa-4x mb-3 text-warning"></i>
                <h3 class="fw-bold">Issued Successfully</h3>
                <h5 id="dist-name" class="mt-3">Name</h5>
                <p id="dist-id" class="mb-1 text-light">ID</p>
                <div class="bg-white text-success rounded py-2 px-4 d-inline-block mt-3 shadow-sm">
                    <h3 class="mb-0 fw-bold">Portions: <span id="dist-count">0</span></h3>
                </div>
            </div>
        </div>

        <button class="btn btn-secondary w-100 mt-2" onclick="exportExcel('issued')"><i class="fa-solid fa-file-excel"></i> Export Today's Logs</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav bg-white shadow">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-home"></i><span>Home</span></a>
        <a href="register.html" class="nav-item"><i class="fa-solid fa-user-plus"></i><span>Register</span></a>
        <a href="issue.html" class="nav-item active"><i class="fa-solid fa-qrcode"></i><span>Issue</span></a>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
