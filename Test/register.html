<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Porridge Distribution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-register" class="bg-light pb-5">

    <nav class="navbar navbar-dark bg-success shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Register Family</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5 pb-4">
        <!-- Scanner Area -->
        <div class="card shadow-sm mb-3">
            <div class="card-body text-center">
                <div id="qr-reader" style="width: 100%;"></div>
                <button class="btn btn-outline-primary mt-3" id="btn-start-scan"><i class="fa-solid fa-camera"></i> Start Scanner</button>
                <button class="btn btn-outline-danger mt-3 d-none" id="btn-stop-scan"><i class="fa-solid fa-stop"></i> Stop Camera</button>
            </div>
        </div>

        <!-- Utilities -->
        <div class="row g-2 mt-4">
            <div class="col-12">
                <button class="btn btn-dark w-100 py-2" onclick="exportExcel('registered')"><i class="fa-solid fa-file-excel"></i> Export Pending Registrations</button>
            </div>
            <div class="col-12">
                <button class="btn btn-outline-danger w-100 py-2" onclick="clearRegistrations()"><i class="fa-solid fa-eraser"></i> Clear Registrations Data</button>
            </div>
        </div>
    </div>

    <!-- REGISTRATION MODAL -->
    <div class="modal fade" id="registerModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-primary">
                <div class="modal-body text-center p-4">
                    <h4 class="text-primary mb-0" id="reg-name">Name</h4>
                    <p class="text-muted small mb-3" id="reg-id">ID</p>
                    <hr>
                    <h6>Select Family Count</h6>
                    <h1 class="text-success mb-3 fw-bold" id="reg-count-display">1</h1>
                    
                    <div class="numpad">
                        <div class="row g-2 mb-2">
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">1</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">2</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">3</button></div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">4</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">5</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">6</button></div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">7</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">8</button></div>
                            <div class="col-4"><button class="btn btn-light w-100 py-3 num-btn">9</button></div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button class="btn btn-secondary w-25 py-2" data-bs-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
                        <button class="btn btn-success w-75 py-2 fs-5" id="btn-save-reg"><i class="fa-solid fa-save"></i> Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav bg-white shadow">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-home"></i><span>Home</span></a>
        <a href="register.html" class="nav-item active"><i class="fa-solid fa-user-plus"></i><span>Register</span></a>
        <a href="issue.html" class="nav-item"><i class="fa-solid fa-qrcode"></i><span>Issue</span></a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
